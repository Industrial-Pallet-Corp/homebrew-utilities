name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Third-party taps now require explicit trust; without this, brew commands on
  # this tap can fail in CI on the untrusted-tap check (Homebrew/brew#22494).
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  lint:
    name: style + audit
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: brew style
        run: brew style industrial-pallet-corp/utilities

      - name: brew audit
        run: brew audit --tap=industrial-pallet-corp/utilities --skip-style
